version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: deepfinance-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepfinance
      POSTGRES_USER: deepfinance
      POSTGRES_PASSWORD: deepfinance_dev
    ports:
      - '5432:5432'
    volumes:
      - ./docker/data/postgres:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U deepfinance']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deepfinance-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
